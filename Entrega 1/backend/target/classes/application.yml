spring:
  application:
    name: solicitudes-academicas

  datasource:
    url: jdbc:h2:file:./data/solicitudes_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

server:
  port: 8080
  servlet:
    context-path: /api/v1

logging:
  level:
    com.universidad: DEBUG
    org.springframework.web: INFO
